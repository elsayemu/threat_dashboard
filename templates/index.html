<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Threat Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      background: #1a1c23;
      min-height: 100vh;
      padding: 2rem 2.5rem 3rem;
      font-family: system-ui, -apple-system, sans-serif;
      color: #c9cdd8;
    }
 
    h1 {
      font-size: 20px;
      font-weight: 500;
      color: #e8eaf0;
      letter-spacing: -0.01em;
      margin-bottom: 1.75rem;
    }
 
    .table-wrap {
      background: #21242e;
      border: 0.5px solid #2e3244;
      border-radius: 10px;
      overflow: hidden;
    }
 
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
 
    thead th {
      background: #1e2130;
      color: #6b7385;
      font-weight: 500;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 10px 18px;
      text-align: left;
      border-bottom: 0.5px solid #2e3244;
    }
 
    tbody tr {
      border-bottom: 0.5px solid #262a38;
      transition: background 0.1s;
    }
 
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #252939; }
 
    tbody td {
      padding: 12px 18px;
      color: #c9cdd8;
    }
 
    /* IP column — monospace blue tint */
    td:nth-child(1) {
      font-family: 'Courier New', monospace;
      font-size: 12.5px;
      color: #8ab4e8;
    }
 
    /* Timestamp column — muted */
    td:nth-child(4) {
      font-size: 12px;
      color: #6b7385;
    }
  </style>
</head>
<body>
 
  <h1>Cybersecurity Threat Dashboard</h1>
 
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>IP</th>
          <th>Score</th>
          <th>Country</th>
          <th>Timestamp</th>
        </tr>
      </thead>
      <tbody id="threatTable"></tbody>
    </table>
  </div>
 
  <script src="/static/script.js"></script>
 
</body>
</html>
